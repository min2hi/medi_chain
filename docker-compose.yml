services:
  db:
    image: pgvector/pgvector:pg15
    container_name: medichain-db
    restart: always
    environment:
      POSTGRES_USER: medichain_user
      POSTGRES_PASSWORD: medichain_password
      POSTGRES_DB: medichain_db
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: medichain-pgbouncer
    environment:
      - DATABASE_URL=postgresql://medichain_user:medichain_password@db:5432/medichain_db
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=1000
      - DEFAULT_POOL_SIZE=20
      - IGNORE_STARTUP_PARAMETERS=extra_float_digits
    ports:
      - "6432:6432"
    depends_on:
      - db
    restart: always

  backend:
    build: ./backend
    container_name: medichain-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://medichain_user:medichain_password@pgbouncer:6432/medichain_db?schema=public&pgbouncer=true
      PORT: 5000
      NODE_ENV: development  # Đổi thành 'production' khi deploy thật lên server
    depends_on:
      - pgbouncer
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: /bin/sh -c "npx prisma generate && npx prisma migrate deploy && npm run dev"
    # ↑ Dùng 'dev' thay vì 'start' để hot-reload trong môi trường dev Docker.
    # Khi deploy production thật, đổi thành:
    # command: /bin/sh -c "npx prisma generate && npx prisma migrate deploy && npm run build && npm start"

volumes:
  postgres_data:
