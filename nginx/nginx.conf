# ============================================================
# Nginx Reverse Proxy — MediChain Production
# ============================================================
# Đây là "cổng chính" của toàn bộ hệ thống:
#   - Nhận tất cả traffic HTTP ở port 80
#   - Route /api/* → backend container
#   - Route /* → frontend container (Next.js)
#
# Lợi ích so với expose thẳng:
#   - Gzip compression: giảm bandwidth ~70%
#   - Single entry point: chỉ cần mở port 80 trên firewall
#   - SSL termination (khi thêm HTTPS)
#   - Logging tập trung
# ============================================================

# Upstream pools — Docker internal DNS tự resolve tên service
upstream frontend_pool {
    server frontend:3000;
    # keepalive: giữ connection alive thay vì tạo mới mỗi request
    keepalive 32;
}

upstream backend_pool {
    server backend:5000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;  # Nhận mọi hostname (thay bằng domain thật nếu có)

    # ─── Gzip Compression ───────────────────────────────────
    # Compress response trước khi gửi về client
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/rss+xml
        application/atom+xml
        image/svg+xml;

    # ─── Security Headers ─────────────────────────────────
    # Chặn clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;
    # Chặn MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;
    # Bật XSS filter trên browser cũ
    add_header X-XSS-Protection "1; mode=block" always;
    # Referrer policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── Client limits ────────────────────────────────────
    client_max_body_size 10m;  # Tăng nếu cần upload file lớn

    # ─── Backend API Route ───────────────────────────────
    # Tất cả request bắt đầu bằng /api/ → chuyển sang backend
    location /api/ {
        proxy_pass http://backend_pool;

        # Truyền thông tin client thật cho backend
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout dài hơn cho AI endpoints (Gemini/Groq có thể mất 30-60s)
        proxy_read_timeout    120s;
        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;

        # HTTP/1.1 với keepalive
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ─── Next.js Static Assets ──────────────────────────
    # Cache lâu hơn cho static files (Next.js tự thêm content hash vào tên file)
    location /_next/static/ {
        proxy_pass http://frontend_pool;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ─── Frontend Routes ────────────────────────────────
    # Tất cả request còn lại → Next.js frontend
    location / {
        proxy_pass http://frontend_pool;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout    30s;
        proxy_connect_timeout 10s;

        proxy_http_version 1.1;
        # Cần cho Next.js Server-Sent Events (streaming)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass          $http_upgrade;
    }
}
