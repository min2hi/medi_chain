# ============================================================
# MediChain — Auto Release & Semantic Versioning
# ============================================================
# Tự động đánh version (v1.0.0, v1.1.0, v2.0.0) dựa trên
# commit messages khi merge vào main.
#
# Quy tắc:
#   fix(...)  → patch  (1.0.0 → 1.0.1)
#   feat(...) → minor  (1.0.0 → 1.1.0)
#   feat!()   → major  (1.0.0 → 2.0.0)
# ============================================================

name: Auto Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: 🏷️ Release Please
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          release-type: node
          token: ${{ secrets.GITHUB_TOKEN }}
